name: AetherFlow CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    - cron: '0 0 * * 0'  # Run every Sunday at 00:00

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      # NOTE: informational only. rustfmt.toml uses nightly-only options, so a
      # bleeding-edge `@nightly` fmt drifts and would red CI on unchanged code.
      # Correctness gates (build/clippy/test) below stay strict. Re-tighten once
      # the toolchain is pinned (see rust-toolchain.toml follow-up).
      - name: Check formatting (informational, never fails CI)
        run: cargo fmt -- --check || true

      - name: Clippy
        run: cargo clippy -- -D warnings

  # Loom explores every legal thread interleaving of the lock-free queues, which
  # is what catches a missing Acquire/Release — a class of bug that ordinary
  # tests and Miri both pass straight through, since it only shows up under an
  # ordering the hardware happens not to produce that run.
  #
  # The cfg is crate-specific on purpose: RUSTFLAGS --cfg reaches every crate in
  # the graph, and a bare `--cfg loom` breaks dependencies that carry their own
  # loom paths without depending on loom (concurrent-queue, via dev-deps). This
  # is the same workaround crossbeam uses with crossbeam_loom.
  loom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            target/
          key: ${{ runner.os }}-loom-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-loom-

      - name: Loom (mpsc / spsc interleavings)
        run: cargo test --lib --release -p aetherflow
        env:
          RUSTFLAGS: --cfg aetherflow_loom

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-outdated
        run: cargo install cargo-outdated

      - name: Check for outdated dependencies (informational, never fails CI)
        run: cargo outdated || true

  # Uncomment the following job if you want to run tests on multiple OS
  # test-on-os:
  #   runs-on: ${{ matrix.os }}
  #   strategy:
  #     matrix:
  #       os: [ubuntu-latest, windows-latest, macOS-latest]
  #   steps:
  #   - uses: actions/checkout@v4
  #   - name: Install latest nightly
  #     uses: dtolnay/rust-toolchain@nightly
  #   - name: Build
  #     run: cargo build --verbose
  #   - name: Run tests
  #     run: cargo test --verbose
